spring:
  config:
    import: optional:file:.env[.properties],optional:file:backend/.env[.properties]
  application:
    name: resiflow
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5600/resiflow}
    username: ${SPRING_DATASOURCE_USERNAME:resiflow}
    password: ${SPRING_DATASOURCE_PASSWORD:resiflow}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:${SPRING_MAIL_SMTP_AUTH:true}}
          connectiontimeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT:5000}
          timeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT:5000}
          writetimeout: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT:5000}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}}

logging:
  level:
    root: INFO
    com.resiflow: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"

app:
  jwt:
    secret: ${APP_JWT_SECRET:Zm9yLWRldmVsb3BtZW50LW9ubHktcmVzaWZsb3ctand0LXNlY3JldC1rZXktMzItYnl0ZXM=}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:3600000}
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    from: ${APP_MAIL_FROM:noreply@resiflow.local}
  captcha:
    enabled: ${APP_CAPTCHA_ENABLED:false}
    site-key: ${APP_CAPTCHA_SITE_KEY:}
    secret-key: ${APP_CAPTCHA_SECRET_KEY:}
    verify-url: ${APP_CAPTCHA_VERIFY_URL:https://challenges.cloudflare.com/turnstile/v0/siteverify}

server:
  address: 0.0.0.0
  port: 8080
